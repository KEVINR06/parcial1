<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfiles - Mediación Cultural</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    color: white;
}

header {
    text-align: center;
    padding: 40px;
}

header h1 {
    font-size: 2.5rem;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: transform 0.4s, box-shadow 0.4s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
}

.card img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-bottom: 15px;
}

.card h2 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 0.9rem;
    opacity: 0.9;
}

/* Modal */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    position: relative;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 22px;
    cursor: pointer;
    color: red;
}

/* Botón video */

.btn-video {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #ff0000, #cc0000);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    transition: 0.3s;
    font-weight: bold;
}

.btn-video:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<header>
    <h1>Perfiles de Mediación Cultural</h1>
    <p>Saberes que conectan generaciones</p>
</header>

<div class="container" id="profileContainer"></div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2 id="modalNombre"></h2>
        <p id="modalInfo"></p>
        <div id="modalBoton"></div>
    </div>
</div>

<script>

const perfiles = [
{
    nombre: "Nidia Martínez",
    ocupacion: "Costurera",
    categoria: "Moda",
    descripcion: "Mijitos, les quiero enseñar por qué las prendas de antes no se descosían nunca. La máquina corre, pero la mano es la que sabe dónde la tela necesita un respiro.",
    video: "https://youtu.be/TC5_Bjc13Bk?si=SE0fQGYtya2kCSES",
    imagen: "https://st4.depositphotos.com/1743476/21196/i/450/depositphotos_211966186-stock-photo-smiling-senior-woman-relaxing-couch.jpg"
},
{
    nombre: "José Ramírez",
    ocupacion: "Carpintero Tradicional",
    categoria: "Artesanía",
    descripcion: "La madera habla si uno aprende a escucharla. Cada corte tiene intención y memoria.",
    video: "https://youtube.com/shorts/nryG2QDOktw?si=0SdDuz4BcLE8BALR",
    imagen: "https://img.freepik.com/fotos-premium/viejo-carpintero-trabajo_103577-134.jpg"
}
];

function mostrarPerfiles(lista) {
    const container = document.getElementById("profileContainer");
    container.innerHTML = "";

    lista.forEach(perfil => {
        container.innerHTML += `
            <div class="card" onclick="abrirModal('${perfil.nombre}', '${perfil.descripcion}', '${perfil.video}')">
                <img src="${perfil.imagen}" alt="${perfil.nombre}">
                <h2>${perfil.nombre}</h2>
                <p>${perfil.ocupacion}</p>
            </div>
        `;
    });
}

function abrirModal(nombre, descripcion, video) {
    document.getElementById("modalNombre").innerText = nombre;
    document.getElementById("modalInfo").innerText = descripcion;

    if(video){
        document.getElementById("modalBoton").innerHTML = `
            <a href="${video}" target="_blank" class="btn-video">
                Ver Video
            </a>
        `;
    } else {
        document.getElementById("modalBoton").innerHTML = "";
    }

    document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modal").style.display = "none";
}

mostrarPerfiles(perfiles);

</script>

</body>
</html>
