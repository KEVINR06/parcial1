<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mediación Cultural</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                    url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
    }

    .banner {
        max-width: 800px;
        padding: 40px;
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    p {
        font-size: 1.3rem;
        margin-bottom: 40px;
        line-height: 1.6;
    }

    .btn {
        padding: 15px 40px;
        font-size: 1.1rem;
        border: none;
        border-radius: 50px;
        background: #00c6ff;
        background: linear-gradient(45deg, #0072ff, #00c6ff);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 768px) {
        h1 { font-size: 2rem; }
        p { font-size: 1rem; }
    }
</style>
</head>

<body>

<div class="banner">
    <h1>Mediación Cultural</h1>
    <p>
        Mi proyecto es un servicio de Mediación Cultural.  
        No es una red social para perder el tiempo,  
        es un sistema donde el valor es el conocimiento compartido.
    </p>
    <a href="perfiles.html" class="btn">Ingresar</a>
</div>

</body>
</html>
